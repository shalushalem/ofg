name: ofg_mobile
description: OFG Connects – Christian media streaming app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # Video playback
  video_player: ^2.9.2

  # State management
  flutter_riverpod: ^2.6.1

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Networking
  http: ^1.2.2

  # File / media handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Sharing
  share_plus: ^10.0.0

  # Internationalisation / formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Add asset folders here as needed, for example:
  # assets:
  #   - assets/images/
  #   - assets/icons/